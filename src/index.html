<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:; connect-src 'none';">
  <title>Nexa Desktop Secretary AI Pro</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">N</span><span>Nexa <small>AI PRO</small></span></div>
      <nav aria-label="Primary navigation">
        <button class="nav-item active" data-section="dashboard" data-testid="nav-dashboard">⌂ <span>Dashboard</span></button>
        <button class="nav-item" data-section="assistant" data-testid="nav-assistant">✦ <span>Assistant</span></button>
        <button class="nav-item" data-section="whatsapp" data-testid="nav-whatsapp">◌ <span>WhatsApp</span></button>
        <button class="nav-item" data-section="activity" data-testid="nav-activity">≡ <span>Activity</span></button>
        <button class="nav-item" data-section="settings" data-testid="nav-settings">⚙ <span>Settings</span></button>
        <button class="nav-item" data-section="diagnostics" data-testid="nav-diagnostics">⌁ <span>Diagnostics</span></button>
        <button class="nav-item" data-section="about" data-testid="nav-about">ⓘ <span>About</span></button>
      </nav>
      <button class="stop-button" data-nexa-action="emergency-stop" data-testid="emergency-stop">■ Emergency Stop</button>
      <div class="sidebar-foot">Nexa Desktop Secretary<br><span>Fase 1 · Windows x64</span></div>
    </aside>
    <section class="content">
      <header class="topbar"><div><span class="eyebrow">DESKTOP SECRETARY</span><h1 id="page-title">Dashboard</h1></div><div class="top-status"><span class="dot"></span><span id="global-status">Operational</span><button class="icon-button" data-nexa-action="emergency-stop" aria-label="Emergency Stop">■</button></div></header>
      <div id="notice" class="notice" role="status" hidden></div>
      <div id="view" class="view"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
